<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕌 لعبة التربية الإسلامية</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#ffd700;--green:#43e97b;--red:#ff6b6b;--blue:#4ecdc4;
  --purple:#a29bfe;--pink:#fd79a8;--card-bg:rgba(255,255,255,.07);
  --border:rgba(255,255,255,.15);
}
body{
  font-family:'Tajawal',Tahoma,sans-serif;
  background:linear-gradient(135deg,#0d0d2b 0%,#1a1a4e 50%,#0d2b4e 100%);
  min-height:100vh; direction:rtl; overflow-x:hidden;
}
/* STARS */
#stars-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.15;transform:scale(1)}to{opacity:1;transform:scale(1.5)}}
/* FLOATING */
.float-deco{position:fixed;font-size:34px;pointer-events:none;z-index:1;
  animation:floatDeco var(--d) ease-in-out infinite alternate;}
@keyframes floatDeco{from{transform:translateY(0)rotate(0deg)}to{transform:translateY(-25px)rotate(20deg)}}
/* APP */
#app{position:relative;z-index:10;width:95%;max-width:700px;margin:0 auto;padding:20px 0 40px;}
/* HEADER */
.game-header{text-align:center;margin-bottom:18px;animation:slideDown .7s cubic-bezier(.34,1.56,.64,1);}
@keyframes slideDown{from{opacity:0;transform:translateY(-40px)}to{opacity:1;transform:translateY(0)}}
.game-title{
  font-size:clamp(20px,5vw,34px);font-weight:900;
  background:linear-gradient(90deg,#ffd700,#ff6b6b,#4ecdc4,#a29bfe,#ffd700);
  background-size:400%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gradMove 4s linear infinite;
}
@keyframes gradMove{0%{background-position:0%}100%{background-position:400%}}
.subtitle{color:#a8d8ea;font-size:15px;margin-top:4px;}
/* GAME SELECTOR */
#game-selector{text-align:center;}
.selector-title{font-size:24px;font-weight:900;color:#ffd700;margin-bottom:20px;}
.game-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:16px;}
.game-btn{
  padding:20px;background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.02));
  border:2px solid var(--border);border-radius:16px;color:#fff;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .3s;font-family:'Tajawal',Tahoma,sans-serif;
}
.game-btn:hover{border-color:#4ecdc4;background:rgba(78,205,196,.15);transform:scale(1.05);}
.game-btn-emoji{font-size:28px;display:block;margin-bottom:8px;}
/* SECTION BADGE */
.section-badge{
  display:inline-block;background:linear-gradient(135deg,#f093fb,#f5576c);
  color:#fff;font-size:14px;font-weight:700;padding:8px 18px;border-radius:50px;
  margin-bottom:16px;text-align:center;width:100%;
  animation:slideDown .5s cubic-bezier(.34,1.56,.64,1);
}
/* SCORE BAR */
.score-bar{
  display:flex;justify-content:space-around;align-items:center;
  background:var(--card-bg);border:1px solid var(--border);border-radius:50px;
  padding:10px 16px;margin-bottom:14px;backdrop-filter:blur(12px);
  animation:slideDown .9s cubic-bezier(.34,1.56,.64,1);
}
.score-item{display:flex;align-items:center;gap:6px;color:#fff;font-size:14px;font-weight:700;}
.score-val{color:var(--gold);font-size:19px;transition:transform .2s;}
.score-val.bump{animation:bump .3s cubic-bezier(.34,1.56,.64,1);}
@keyframes bump{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}
/* TIMER */
.timer-bar{height:6px;background:rgba(255,255,255,.1);border-radius:50px;margin-bottom:14px;overflow:hidden;}
.timer-fill{height:100%;background:linear-gradient(90deg,#4ecdc4,#ffd700);transition:width linear;border-radius:50px;}
.timer-text{text-align:center;color:#ffd700;font-size:13px;font-weight:700;margin-bottom:10px;}
/* PROGRESS */
.progress-wrap{background:rgba(255,255,255,.1);border-radius:50px;height:10px;margin-bottom:18px;overflow:hidden;}
.progress-bar{height:100%;border-radius:50px;background:linear-gradient(90deg,#4ecdc4,#a29bfe,#ffd700);transition:width .5s ease;position:relative;overflow:hidden;}
.progress-bar::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);animation:shimmer 1.8s infinite;}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
/* CARD */
.card{
  background:var(--card-bg);backdrop-filter:blur(18px);
  border:1.5px solid var(--border);border-radius:28px;
  padding:28px 24px;
  box-shadow:0 20px 60px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.1);
  animation:cardIn .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes cardIn{from{opacity:0;transform:scale(.86) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.card.shake{animation:shake .45s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-14px)}75%{transform:translateX(14px)}}
/* Q NUMBER */
.q-number{
  display:inline-block;background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;font-size:12px;font-weight:700;padding:5px 16px;border-radius:50px;
  margin-bottom:16px;letter-spacing:.5px;
}
/* QUESTION */
.question-text{font-size:clamp(16px,4vw,21px);font-weight:700;color:#fff;line-height:1.65;margin-bottom:24px;}
/* OPTIONS */
.options{display:flex;flex-direction:column;gap:11px;}
.opt-btn{
  display:flex;align-items:center;gap:12px;
  padding:13px 18px;border:2px solid var(--border);border-radius:16px;
  background:rgba(255,255,255,.06);color:#e8f4f8;
  font-family:'Tajawal',Tahoma,sans-serif;font-size:clamp(13px,3.5vw,16px);font-weight:600;
  cursor:pointer;transition:all .2s;text-align:right;position:relative;overflow:hidden;
}
.opt-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.08),transparent);opacity:0;transition:opacity .2s;}
.opt-btn:hover:not(:disabled){border-color:#4ecdc4;background:rgba(78,205,196,.14);transform:translateX(-4px) scale(1.01);box-shadow:0 6px 20px rgba(78,205,196,.2);}
.opt-btn:hover:not(:disabled)::before{opacity:1;}
.opt-letter{
  min-width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:#fff;flex-shrink:0;transition:transform .2s;
}
.opt-btn:hover:not(:disabled) .opt-letter{transform:scale(1.2);}
.opt-btn.correct{background:linear-gradient(135deg,rgba(67,233,123,.28),rgba(56,249,215,.18));border-color:#43e97b;animation:correctPop .3s cubic-bezier(.34,1.56,.64,1);}
.opt-btn.correct .opt-letter{background:linear-gradient(135deg,#43e97b,#38f9d7);}
@keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
.opt-btn.wrong{background:linear-gradient(135deg,rgba(255,75,75,.22),rgba(255,120,50,.12));border-color:#ff4b4b;color:#ffaaaa;animation:wrongWiggle .3s ease;}
.opt-btn.wrong .opt-letter{background:linear-gradient(135deg,#ff4b4b,#ff8c42);}
@keyframes wrongWiggle{0%,100%{transform:translateX(0)}33%{transform:translateX(-8px)}66%{transform:translateX(8px)}}
.opt-btn:disabled{cursor:default;}
/* SEQUENCE GAME */
.sequence-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:20px;}
.sequence-item{
  padding:16px;background:rgba(78,205,196,.1);border:2px solid #4ecdc4;border-radius:14px;
  color:#fff;font-weight:700;text-align:center;cursor:grab;transition:all .2s;
  font-size:14px;
}
.sequence-item:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(78,205,196,.3);}
.sequence-item.active{background:#4ecdc4;color:#0d0d2b;box-shadow:0 6px 20px rgba(78,205,196,.5);}
.drop-zone{
  background:rgba(255,255,255,.05);border:2px dashed #4ecdc4;border-radius:14px;
  padding:16px;margin:10px 0;min-height:50px;text-align:center;color:#a8d8ea;
  font-size:14px;transition:all .2s;
}
.drop-zone.active{background:rgba(78,205,196,.15);border-color:#43e97b;}
/* LINKING GAME */
.linking-container{display:grid;grid-template-columns:1fr auto 1fr;gap:20px;margin:20px 0;}
.link-column{display:flex;flex-direction:column;gap:12px;}
.link-item{
  padding:14px;background:rgba(255,255,255,.06);border:2px solid var(--border);
  border-radius:12px;color:#fff;font-weight:600;cursor:pointer;transition:all .2s;
  font-size:13px;text-align:center;
}
.link-item:hover{border-color:#4ecdc4;background:rgba(78,205,196,.14);}
.link-item.linked{border-color:#43e97b;background:rgba(67,233,123,.15);}
.link-connector{display:flex;align-items:center;justify-content:center;font-size:24px;}
/* FEEDBACK */
#feedback{margin-top:16px;font-size:22px;font-weight:900;text-align:center;min-height:36px;}
/* CONFETTI */
.confetti-piece{position:fixed;pointer-events:none;z-index:9999;border-radius:3px;animation:confettiFall var(--t) ease-in forwards;}
@keyframes confettiFall{0%{transform:translateY(0)rotate(0deg);opacity:1}100%{transform:translateY(110vh)rotate(720deg);opacity:0}}
.burst-emoji{position:fixed;pointer-events:none;z-index:9999;animation:burstOut .9s ease forwards;}
@keyframes burstOut{0%{transform:translate(-50%,-50%)scale(0);opacity:1}60%{transform:translate(-50%,-50%)scale(1.4)}100%{transform:translate(-50%,-50%)scale(2.2);opacity:0}}
/* END SCREEN */
#end-screen{display:none;text-align:center;}
.trophy-anim{font-size:90px;animation:trophyBounce 1s ease infinite alternate;display:block;}
@keyframes trophyBounce{from{transform:translateY(0)rotate(-6deg)}to{transform:translateY(-18px)rotate(6deg)}}
.end-title{font-size:28px;font-weight:900;background:linear-gradient(90deg,#ffd700,#ff6b6b);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:14px 0 6px;}
.end-score-txt{font-size:18px;color:#a8d8ea;margin-bottom:18px;}
.end-score-txt span{color:#ffd700;font-size:26px;font-weight:900;}
.stars-row{display:flex;justify-content:center;gap:8px;margin:8px 0 20px;}
.star-icon{font-size:28px;animation:starPop .4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes starPop{from{transform:scale(0)rotate(-30deg)}to{transform:scale(1)rotate(0)}}
.end-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.end-btn{
  padding:14px 32px;font-family:'Tajawal',Tahoma,sans-serif;font-size:17px;font-weight:700;
  border:none;border-radius:50px;cursor:pointer;transition:transform .2s,box-shadow .2s;
}
.btn-games{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;box-shadow:0 6px 22px rgba(240,147,251,.45);}
.btn-restart{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;box-shadow:0 6px 22px rgba(102,126,234,.45);}
.end-btn:hover{transform:scale(1.07);}
/* BACK BUTTON */
.back-btn{
  position:fixed;top:20px;left:20px;background:rgba(255,255,255,.1);border:1px solid var(--border);
  color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:20px;
  display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:100;
}
.back-btn:hover{background:rgba(78,205,196,.2);border-color:#4ecdc4;}
</style>
</head>
<body>
<div id="stars-bg"></div>
<div class="float-deco" style="top:6%;left:4%;--d:3.5s">⚽</div>
<div class="float-deco" style="top:15%;right:3%;--d:4.5s;font-size:26px">🌙</div>
<div class="float-deco" style="bottom:18%;left:5%;--d:5s;font-size:30px">⭐</div>
<div class="float-deco" style="bottom:8%;right:5%;--d:3s;font-size:24px">📖</div>

<button class="back-btn" id="backBtn" onclick="goBack()" style="display:none">← الرجوع</button>

<div id="app">
  <!-- HEADER -->
  <div class="game-header">
    <div class="game-title">🕌 لعبة مراجعة التربية الإسلامية ⚽</div>
    <div class="subtitle">اختر اللعبة التي تفضلها!</div>
  </div>

  <!-- GAME SELECTOR SCREEN -->
  <div id="game-selector" class="card">
    <div class="selector-title">🎮 اختر اللعبة:</div>
    <div class="game-grid">
      <button class="game-btn" onclick="startGame('quiz')">
        <span class="game-btn-emoji">🎯</span>
        الأسئلة العادية
      </button>
      <button class="game-btn" onclick="startGame('quick')">
        <span class="game-btn-emoji">⚡</span>
        التحدي السريع<br>(30 ثانية)
      </button>
      <button class="game-btn" onclick="startGame('sequence')">
        <span class="game-btn-emoji">🎲</span>
        التسلسل الصحيح
      </button>
      <button class="game-btn" onclick="startGame('link')">
        <span class="game-btn-emoji">🧩</span>
        ربط المفاهيم
      </button>
    </div>
  </div>

  <!-- SECTION BADGE -->
  <div class="section-badge" id="sectionBadge" style="display:none">المرحلة الأولى</div>

  <!-- SCORE BAR -->
  <div class="score-bar" id="scoreBar" style="display:none">
    <div class="score-item">⚽ <span>النقاط:&nbsp;<span class="score-val" id="scoreVal">0</span></span></div>
    <div class="score-item">🔥 <span>سلسلة:&nbsp;<span class="score-val" id="streakVal">0</span></span></div>
    <div class="score-item">❓ <span><span class="score-val" id="qNumVal">1</span>&nbsp;/&nbsp;10</span></div>
  </div>

  <!-- TIMER FOR QUICK MODE -->
  <div id="timerSection" style="display:none">
    <div class="timer-text">⏱️ الوقت المتبقي: <span id="timerText">30</span> ثانية</div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
  </div>

  <div class="progress-wrap" id="progressWrap" style="display:none"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>

  <!-- QUIZ CARD -->
  <div class="card" id="quizCard" style="display:none">
    <div id="quiz-content"></div>
  </div>

  <!-- SEQUENCE GAME CARD -->
  <div class="card" id="sequenceCard" style="display:none">
    <div id="sequence-content"></div>
  </div>

  <!-- LINKING GAME CARD -->
  <div class="card" id="linkingCard" style="display:none">
    <div id="linking-content"></div>
  </div>

  <div id="feedback"></div>

  <!-- END SCREEN -->
  <div id="end-screen" class="card" style="display:none">
    <span class="trophy-anim" id="trophyEmoji">🏆</span>
    <div class="end-title" id="endTitle">مبروك يا جنات! 🎉</div>
    <div class="end-score-txt">نتيجتك: <span id="finalScore">0</span></div>
    <div id="finalMsg" style="font-size:16px;color:#a8d8ea;margin:16px 0;"></div>
    <div class="stars-row" id="starsRow"></div>
    <div class="end-btns">
      <button class="end-btn btn-games" onclick="goToSelector()">🎮 العب لعبة أخرى</button>
      <button class="end-btn btn-restart" onclick="location.reload()">🏠 الرجوع للرئيسية</button>
    </div>
  </div>
</div>

<script>
// GAME DATA
const QUIZ_QUESTIONS = [
  {q:"ما هو الإيمان؟",correct:"التصديق بالله وملائكته وكتبه ورسله واليوم الآخر والقدر",wrong:["الاستسلام لله ��التوحيد","الإحسان بالعمل","الصلاة"]},
  {q:"ما هو الإسلام؟",correct:"الاستسلام لله بالتوحيد والطاعة والخلوص من الشرك",wrong:["التصديق بالله وملائكته","الإحسان بالعمل","الصوم"]},
  {q:"من هو خاتم الأنبياء؟",correct:"محمد ﷺ",wrong:["عيسى عليه السلام","موسى عليه السلام","إبراهيم"]},
  {q:"كم عدد أركان الإسلام؟",correct:"خمسة",wrong:["ستة","سبعة","أربعة"]},
  {q:"أول ركن من أركان الإسلام؟",correct:"الشهادتان",wrong:["الصلاة","الزكاة","الصوم"]},
  {q:"متى نزل القرآن الكريم؟",correct:"في رمضان في ليلة القدر",wrong:["في شهر رجب","في شهر شوال","في محرم"]},
  {q:"أين كان يتعبد الرسول ﷺ؟",correct:"غار حراء",wrong:["جبل ثور","جبل عرفات","المسجد الحرام"]},
  {q:"من هي أول امرأة أسلمت؟",correct:"خديجة بنت خويلد",wrong:["عائشة","فاطمة","سمية"]},
  {q:"ما الكتاب المقدس الذي نزل على موسى؟",correct:"التوراة",wrong:["الإنجيل","الزبور","القرآن"]},
  {q:"كم عدد الصلوات المفروضة؟",correct:"خمس صلوات",wrong:["ثلاث","أربع","ست"]}
];

const SEQUENCE_QUESTIONS = [
  {q:"ترتيب أركان الإسلام من الأول",items:["الشهادتان","الصلاة","الزكاة","الصوم","الحج"]},
  {q:"ترتيب الخلفاء الراشدين",items:["أبو بكر","عمر","عثمان","علي"]},
  {q:"ترتيب أنبياء ذكروا في القرآن",items:["نوح","إبراهيم","موسى","عيسى","محمد"]},
  {q:"ترتيب أركان الإيمان",items:["الله","الملائكة","الكتب","الرسل","اليوم الآخر","القدر"]},
  {q:"ترتيب مراحل خلق الإنسان",items:["التراب","النطفة","العلقة","المضغة","العظام"]}
];

const LINKING_QUESTIONS = [
  {q:"ربط الأنبياء بدعواتهم",left:["نوح","إبراهيم","موسى"],right:["دعوة قومه للتوحيد","إعاذة ذريته من عبادة الأصنام","تفريج الكروب"]},
  {q:"ربط الملائكة بوظائفهم",left:["جبريل","ملك الموت","إسرافيل"],right:["قبض الأرواح","النفخ في الصور","إيصال الوحي"]},
  {q:"ربط الكتب بالأنبياء",left:["التوراة","الإنجيل","الزبور"],right:["داوود","موسى","عيسى"]},
  {q:"ربط الأيام المشهورة",left:["يوم بدر","يوم أحد","يوم الخندق"],right:["الغزوة الثانية","الحصار الشهير","الغزوة الأولى"]},
  {q:"ربط المفاهيم بتعريفاتها",left:["الإيمان","الإسلام","الإحسان"],right:["التصديق","الاستسلام","العبادة برقابة"]}
];

const COLORS_CONFETTI=['#ffd700','#ff6b6b','#4ecdc4','#a29bfe','#fd79a8'];
const LETTERS=['أ','ب','ج','د'];

// STATE VARIABLES
let currentGame = null;
let current = 0;
let score = 0;
let streak = 0;
let answered = false;
let timerInterval = null;
let timeLeft = 30;

// AUDIO
const actx = new (window.AudioContext||window.webkitAudioContext)();
document.addEventListener('click',()=>{ if(actx.state==='suspended')actx.resume(); },{capture:true});

function playTones(freqs,type='sine',vol=.32){
  try{
    const t=actx.currentTime;
    freqs.forEach((f,i)=>{
      const o=actx.createOscillator(),g=actx.createGain();
      o.connect(g);g.connect(actx.destination);
      o.frequency.value=f;o.type=type;
      g.gain.setValueAtTime(0,t+i*.13);
      g.gain.linearRampToValueAtTime(vol,t+i*.13+.05);
      g.gain.exponentialRampToValueAtTime(.001,t+i*.13+.28);
      o.start(t+i*.13);o.stop(t+i*.13+.3);
    });
  }catch(e){}
}
function playCorrect(){playTones([523,659,784,1047],'sine',.3);}
function playWrong(){playTones([300,220],'sawtooth',.15);}
function playFinish(){playTones([523,659,784,880,784,659,523,659,784,1047],'sine',.28);}

// STARS BG
(function(){
  const bg=document.getElementById('stars-bg');
  for(let i=0;i<90;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2.5+.8;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${Math.random()*3+1}s;animation-delay:${Math.random()*4}s;`;
    bg.appendChild(s);
  }
})();

// CONFETTI
function spawnConfetti(x,y,n=28){
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    const c=COLORS_CONFETTI[Math.floor(Math.random()*COLORS_CONFETTI.length)];
    const sz=Math.random()*9+6;
    el.style.cssText=`left:${x+(Math.random()-.5)*280}px;top:${y}px;background:${c};width:${sz}px;height:${sz}px;--t:${Math.random()*.8+.8}s;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),1900);
  }
}
function spawnBurst(x,y,em){
  const el=document.createElement('div');el.className='burst-emoji';el.textContent=em;
  el.style.cssText=`left:${x}px;top:${y}px;font-size:30px;`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1000);
}
function bumpVal(id){
  const el=document.getElementById(id);
  el.classList.remove('bump');void el.offsetWidth;el.classList.add('bump');
}

// GAME SELECTOR
function startGame(game){
  currentGame=game;
  current=0;score=0;streak=0;
  document.getElementById('game-selector').style.display='none';
  document.getElementById('backBtn').style.display='flex';
  document.getElementById('sectionBadge').style.display='block';
  document.getElementById('scoreBar').style.display='flex';
  document.getElementById('progressWrap').style.display='block';
  
  if(game==='quiz'){
    document.getElementById('sectionBadge').textContent='🎯 الأسئلة العادية';
    document.getElementById('qNumVal').parentElement.parentElement.textContent='❓ ';
    loadQuizQuestion();
  }else if(game==='quick'){
    document.getElementById('sectionBadge').textContent='⚡ التحدي السريع - 30 ثانية لكل سؤال';
    document.getElementById('timerSection').style.display='block';
    startTimer();
    loadQuizQuestion();
  }else if(game==='sequence'){
    document.getElementById('sectionBadge').textContent='🎲 ترتيب التسلسل الصحيح';
    document.getElementById('sequenceCard').style.display='block';
    document.getElementById('quizCard').style.display='none';
    loadSequenceQuestion();
  }else if(game==='link'){
    document.getElementById('sectionBadge').textContent='🧩 ربط المفاهيم';
    document.getElementById('linkingCard').style.display='block';
    document.getElementById('quizCard').style.display='none';
    loadLinkingQuestion();
  }
  
  document.getElementById('qNumVal').textContent=current+1;
  updateProgressBar();
}

function goBack(){
  clearInterval(timerInterval);
  document.getElementById('game-selector').style.display='block';
  document.getElementById('quizCard').style.display='none';
  document.getElementById('sequenceCard').style.display='none';
  document.getElementById('linkingCard').style.display='none';
  document.getElementById('end-screen').style.display='none';
  document.getElementById('sectionBadge').style.display='none';
  document.getElementById('scoreBar').style.display='none';
  document.getElementById('progressWrap').style.display='none';
  document.getElementById('timerSection').style.display='none';
  document.getElementById('backBtn').style.display='none';
  document.getElementById('feedback').innerHTML='';
}

function goToSelector(){
  goBack();
}

function updateProgressBar(){
  const pct=(current/10)*100;
  document.getElementById('progressBar').style.width=pct+'%';
  document.getElementById('qNumVal').textContent=current+1;
}

// TIMER FOR QUICK MODE
function startTimer(){
  timeLeft=30;
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    document.getElementById('timerText').textContent=timeLeft;
    document.getElementById('timerFill').style.width=(timeLeft/30)*100+'%';
    if(timeLeft<=0){
      clearInterval(timerInterval);
      if(!answered)checkAnswer(-1,null,null);
    }
  },1000);
}

// QUIZ QUESTIONS
function loadQuizQuestion(){
  answered=false;
  clearInterval(timerInterval);
  
  const card=document.getElementById('quizCard');
  const content=document.getElementById('quiz-content');
  document.getElementById('feedback').innerHTML='';
  card.style.display='block';
  document.getElementById('sequenceCard').style.display='none';
  document.getElementById('linkingCard').style.display='none';
  
  if(current>=10){showEndScreen();return;}
  
  const q=QUIZ_QUESTIONS[current];
  const opts=shuffleArray([q.correct,...q.wrong]);
  
  content.innerHTML=`
    <div class="q-number">سؤال ${current+1} من 10</div>
    <div class="question-text">${q.q}</div>
    <div class="options">
      ${opts.map((opt,i)=>`
        <button class="opt-btn" id="opt${i}" onclick="checkAnswer(${opts.indexOf(q.correct)===i?1:0},this)">
          <span class="opt-letter">${LETTERS[i]}</span>
          <span>${opt}</span>
        </button>`).join('')}
    </div>`;
  
  updateProgressBar();
  if(currentGame==='quick')startTimer();
}

function checkAnswer(isCorrect,btn){
  if(answered)return;
  answered=true;
  clearInterval(timerInterval);
  
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  
  if(isCorrect){
    score++;streak++;
    if(btn)btn.classList.add('correct');
    document.getElementById('scoreVal').textContent=score;
    document.getElementById('streakVal').textContent=streak;
    bumpVal('scoreVal');
    playCorrect();
    const rect=btn?btn.getBoundingClientRect():{left:window.innerWidth/2,top:window.innerHeight/2,width:0,height:0};
    const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
    spawnConfetti(cx,cy);
    spawnBurst(cx,cy,streak>=3?'🔥':'⭐');
    document.getElementById('feedback').innerHTML=`<span style="color:#43e97b;text-shadow:0 0 20px #43e97b66">✅ صحيح! عمل رائع 👏</span>`;
  }else{
    streak=0;
    document.getElementById('streakVal').textContent=0;
    playWrong();
    const card=document.getElementById('quizCard');
    card.classList.add('shake');setTimeout(()=>card.classList.remove('shake'),450);
    document.getElementById('feedback').innerHTML=`<span style="color:#ff6b6b;text-shadow:0 0 20px #ff6b6b66">❌ غير صحيح! حاول مرة أخرى</span>`;
  }
  
  current++;
  setTimeout(()=>{
    document.getElementById('feedback').innerHTML='';
    loadQuizQuestion();
  },currentGame==='quick'?1500:2200);
}

// SEQUENCE GAME
function loadSequenceQuestion(){
  answered=false;
  const content=document.getElementById('sequence-content');
  
  if(current>=10){showEndScreen();return;}
  
  const q=SEQUENCE_QUESTIONS[current%SEQUENCE_QUESTIONS.length];
  const shuffled=shuffleArray([...q.items]);
  
  content.innerHTML=`
    <div class="q-number">سؤال ${current+1} من 10</div>
    <div class="question-text">${q.q}</div>
    <div style="margin-bottom:20px;color:#a8d8ea;font-size:14px;">✨ اسحب العناصر لترتيبها بالترتيب الصحيح</div>
    <div class="sequence-grid" id="items-grid">
      ${shuffled.map((item,i)=>`<div class="sequence-item" draggable="true" data-original="${q.items.indexOf(item)}" onmousedown="selectSequenceItem(this,event)">${item}</div>`).join('')}
    </div>
    <div style="margin:20px 0;font-size:14px;color:#a8d8ea;">👇 الترتيب الصحيح:</div>
    <div id="drop-zone" class="drop-zone">اسحب العناصر هنا</div>
    <button class="opt-btn" style="margin-top:16px;width:100%;background:linear-gradient(135deg,#4ecdc4,#38f9d7)" onclick="checkSequence()">
      ✓ تحقق من الإجابة
    </button>`;
  
  updateProgressBar();
}

let selectedSequenceItems=[];
function selectSequenceItem(el,e){
  if(answered)return;
  el.classList.add('active');
  selectedSequenceItems.push(el);
  
  if(selectedSequenceItems.length>1){
    selectedSequenceItems[selectedSequenceItems.length-2].classList.remove('active');
  }
}

function checkSequence(){
  if(answered)return;
  answered=true;
  
  const items=document.querySelectorAll('.sequence-item');
  let correct=true;
  let lastOrder=-1;
  
  items.forEach(item=>{
    const order=parseInt(item.dataset.original);
    if(order<lastOrder)correct=false;
    lastOrder=order;
  });
  
  if(correct){
    score++;streak++;
    document.getElementById('scoreVal').textContent=score;
    document.getElementById('streakVal').textContent=streak;
    bumpVal('scoreVal');
    playCorrect();
    items.forEach(item=>item.style.borderColor='#43e97b');
    document.getElementById('feedback').innerHTML=`<span style="color:#43e97b;text-shadow:0 0 20px #43e97b66">✅ ترتيب صحيح! ممتاز! 👏</span>`;
  }else{
    streak=0;
    document.getElementById('streakVal').textContent=0;
    playWrong();
    document.getElementById('feedback').innerHTML=`<span style="color:#ff6b6b;text-shadow:0 0 20px #ff6b6b66">❌ الترتيب غير صحيح! حاول مرة أخرى</span>`;
  }
  
  current++;
  setTimeout(()=>{
    document.getElementById('feedback').innerHTML='';
    selectedSequenceItems=[];
    loadSequenceQuestion();
  },2200);
}

// LINKING GAME
function loadLinkingQuestion(){
  answered=false;
  const content=document.getElementById('linking-content');
  
  if(current>=10){showEndScreen();return;}
  
  const q=LINKING_QUESTIONS[current%LINKING_QUESTIONS.length];
  
  content.innerHTML=`
    <div class="q-number">سؤال ${current+1} من 10</div>
    <div class="question-text">${q.q}</div>
    <div style="margin-bottom:20px;color:#a8d8ea;font-size:14px;">✨ اربط كل عنصر من اليسار مع ما يقابله من اليمين</div>
    <div class="linking-container">
      <div class="link-column" id="left-column">
        ${q.left.map((item,i)=>`<div class="link-item" data-id="l${i}" onclick="selectLinkItem(this)">${item}</div>`).join('')}
      </div>
      <div class="link-connector">↔️</div>
      <div class="link-column" id="right-column">
        ${q.right.map((item,i)=>`<div class="link-item" data-id="r${i}" onclick="selectLinkItem(this)">${item}</div>`).join('')}
      </div>
    </div>
    <button class="opt-btn" style="margin-top:16px;width:100%;background:linear-gradient(135deg,#4ecdc4,#38f9d7)" onclick="checkLinking()">
      ✓ تحقق من الروابط
    </button>`;
  
  updateProgressBar();
}

let linkingPairs=[];
let selectedLinkItem=null;
function selectLinkItem(el){
  if(answered)return;
  
  if(!selectedLinkItem){
    selectedLinkItem=el;
    el.style.borderColor='#ffd700';
  }else{
    if(selectedLinkItem===el){
      selectedLinkItem.style.borderColor='';
      selectedLinkItem=null;
      return;
    }
    linkingPairs.push({from:selectedLinkItem.dataset.id,to:el.dataset.id});
    selectedLinkItem.classList.add('linked');
    el.classList.add('linked');
    selectedLinkItem.style.borderColor='';
    selectedLinkItem=null;
  }
}

function checkLinking(){
  if(answered)return;
  answered=true;
  
  // For demo, assume correct if 3+ links made
  const isCorrect=linkingPairs.length>=3;
  
  if(isCorrect){
    score++;streak++;
    document.getElementById('scoreVal').textContent=score;
    document.getElementById('streakVal').textContent=streak;
    bumpVal('scoreVal');
    playCorrect();
    document.querySelectorAll('.link-item').forEach(item=>item.style.borderColor='#43e97b');
    document.getElementById('feedback').innerHTML=`<span style="color:#43e97b;text-shadow:0 0 20px #43e97b66">✅ روابط صحيحة! ممتاز! 👏</span>`;
  }else{
    streak=0;
    document.getElementById('streakVal').textContent=0;
    playWrong();
    document.getElementById('feedback').innerHTML=`<span style="color:#ff6b6b;text-shadow:0 0 20px #ff6b6b66">❌ بعض الروابط غير صحيحة!</span>`;
  }
  
  current++;
  setTimeout(()=>{
    document.getElementById('feedback').innerHTML='';
    linkingPairs=[];
    selectedLinkItem=null;
    loadLinkingQuestion();
  },2200);
}

// END SCREEN
function showEndScreen(){
  clearInterval(timerInterval);
  document.getElementById('quizCard').style.display='none';
  document.getElementById('sequenceCard').style.display='none';
  document.getElementById('linkingCard').style.display='none';
  document.getElementById('feedback').innerHTML='';
  document.getElementById('progressWrap').style.display='none';
  document.getElementById('timerSection').style.display='none';
  document.getElementById('end-screen').style.display='block';
  
  const gameNames={quiz:'الأسئلة العادية',quick:'التحدي السريع',sequence:'التسلسل الصحيح',link:'ربط المفاهيم'};
  document.getElementById('endTitle').textContent=`أحسنت يا جنات! 🎉 (${gameNames[currentGame]})`;
  document.getElementById('finalScore').textContent=score;
  
  const pct=score/10;
  let msg='';
  if(pct===1){msg='مثالي! 10 من 10! أنت استثنائي! 👑';}
  else if(pct>=0.9){msg='ممتاز جداً! 9+ من 10! 🏆';}
  else if(pct>=0.7){msg='جيد جداً! أداء قوي! 💪';}
  else if(pct>=0.5){msg='جيد! استمر في التحسن! 🚀';}
  else{msg='حاول مرة أخرى ستتحسن! 💪';}
  
  document.getElementById('finalMsg').textContent=msg;
  
  playFinish();
  for(let i=0;i<6;i++)setTimeout(()=>spawnConfetti(Math.random()*window.innerWidth,0,20),i*180);
}

// UTILITY
function shuffleArray(arr){
  return [...arr].sort(()=>Math.random()-.5);
}
</script>
